{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | ChatFlow</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111113;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 82, 91, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        p.subtitle {
            color: #a1a1aa;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #d4d4d8;
        }
        .form-group input {
            width: 100%;
            background: rgba(39, 39, 42, 0.5);
            border: 1px solid rgba(82, 82, 91, 0.5);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: #7C3AED;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Change Password</h2>
        {% if token_fail %}
            <p class="subtitle" style="color: #ef4444;">The password reset link was invalid, possibly because it has already been used.</p>
            <a href="{% url 'account_reset_password' %}" style="display: block; text-align: center; color: #8B5CF6;">Request a new link</a>
        {% else %}
            <p class="subtitle">Enter your new password below.</p>
            <form method="POST" action="">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_password1">New Password</label>
                    <input type="password" name="password1" id="id_password1" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Change Password</button>
            </form>
        {% endif %}
    </div>
</body>
</html>

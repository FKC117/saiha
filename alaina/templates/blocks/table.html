<div class="rich-block table-block">
  <div class="block-header">
    <div class="block-title-group">
      <i data-lucide="table-2" class="block-icon" size="14"></i>
      <span class="block-label">Data Table</span>
      <span style="color: var(--zinc-700);">·</span>
      <span class="block-title">{{ title }}</span>
    </div>
    <div class="block-actions">
      <button class="block-btn" hx-get="/export/table/" hx-swap="none">
        <i data-lucide="download" size="12"></i>
        Export
      </button>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          {% for col in columns %}
          <th>{{ col }}</th>
          {% endfor %}
        </tr>
      </thead>
      <tbody>
        {% for row in rows %}
        <tr>
          {% for cell in row %}
          <td>{{ cell }}</td>
          {% endfor %}
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

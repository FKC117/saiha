{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | ChatFlow</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #111113;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 82, 91, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .icon-box {
            background: rgba(139, 92, 246, 0.1);
            color: #8B5CF6;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        p {
            color: #a1a1aa;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 32px;
        }
        .btn-primary {
            display: inline-block;
            width: 100%;
            background: #8B5CF6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .btn-primary:hover {
            background: #7C3AED;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="icon-box">
            <i data-lucide="mail" size="32"></i>
        </div>
        <h2>Check your email</h2>
        <p>We've sent a password reset link to your email. Please follow the instructions to reset your password.</p>
        <a href="{% url 'account_login' %}" class="btn-primary">Back to login</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>

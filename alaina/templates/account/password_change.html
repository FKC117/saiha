{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | ChatFlow</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #111113;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 82, 91, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        p.subtitle {
            color: #a1a1aa;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #d4d4d8;
        }
        .form-group input {
            width: 100%;
            background: rgba(39, 39, 42, 0.5);
            border: 1px solid rgba(82, 82, 91, 0.5);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: rgba(39, 39, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
        .btn-primary {
            width: 100%;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #7C3AED;
            transform: translateY(-1px);
        }
        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: #a1a1aa;
        }
        .auth-footer a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 500;
        }
        .errorlist {
            list-style: none;
            padding: 0;
            margin: 0 0 16px 0;
            color: #ef4444;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-section">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#8B5CF6"/>
                <path d="M7 12L12 7L17 12L12 17L7 12Z" fill="white"/>
            </svg>
            <span class="logo-text">ChatFlow</span>
        </div>

        <h2>Change Password</h2>
        <p class="subtitle">Please enter your current and new password.</p>

        <form method="POST" action="{% url 'account_change_password' %}">
            {% csrf_token %}
            {{ form.non_field_errors }}
            
            <div class="form-group">
                <label for="id_old_password">Current Password</label>
                <input type="password" name="old_password" id="id_old_password" placeholder="••••••••" required>
                {{ form.old_password.errors }}
            </div>
            
            <div class="form-group">
                <label for="id_password1">New Password</label>
                <input type="password" name="password1" id="id_password1" placeholder="••••••••" required>
                {{ form.password1.errors }}
            </div>
            
            <div class="form-group">
                <label for="id_password2">Confirm New Password</label>
                <input type="password" name="password2" id="id_password2" placeholder="••••••••" required>
                {{ form.password2.errors }}
            </div>
            
            <button type="submit" class="btn-primary">Update Password</button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'saiha:index' %}">Back to Dashboard</a>
        </div>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Sent | ChatFlow</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #111113;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 82, 91, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .icon-container {
            width: 64px;
            height: 64px;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: #8B5CF6;
        }
        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p.subtitle {
            color: #a1a1aa;
            font-size: 15px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn-primary {
            display: block;
            width: 100%;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #7C3AED;
            transform: translateY(-1px);
        }
        .auth-footer {
            margin-top: 32px;
            font-size: 14px;
            color: #a1a1aa;
        }
        .auth-footer a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="icon-container">
            <i data-lucide="mail" size="32"></i>
        </div>

        <h2>Check your email</h2>
        <p class="subtitle">We've sent a verification link to your email address. Please click the link in the message to activate your account and access ChatFlow.</p>

        <a href="{% url 'account_login' %}" class="btn-primary">Back to Login</a>

        <div class="auth-footer">
            Didn't receive it? <a href="{% url 'account_login' %}">Check your spam folder</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>

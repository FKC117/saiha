{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ChatFlow</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #111113;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 82, 91, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            justify-content: center;
        }
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        p.subtitle {
            color: #a1a1aa;
            font-size: 14px;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #d4d4d8;
        }
        .form-group input {
            width: 100%;
            background: rgba(39, 39, 42, 0.5);
            border: 1px solid rgba(82, 82, 91, 0.5);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            background: rgba(39, 39, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
        }
        .btn-primary {
            width: 100%;
            background: #8B5CF6;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background: #7C3AED;
            transform: translateY(-1px);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #3f3f46;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(82, 82, 91, 0.3);
        }
        .divider span {
            padding: 0 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-google {
            width: 100%;
            background: white;
            color: #18181b;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-google:hover {
            background: #f4f4f5;
        }
        .auth-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 14px;
            color: #a1a1aa;
        }
        .auth-footer a {
            color: #8B5CF6;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .auth-card {
                padding: 24px;
                border-radius: 16px;
            }
            .logo-section {
                margin-bottom: 24px;
            }
            h2 {
                font-size: 18px;
            }
            p.subtitle {
                margin-bottom: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-section">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="24" height="24" rx="6" fill="#8B5CF6"/>
                <path d="M7 12L12 7L17 12L12 17L7 12Z" fill="white"/>
            </svg>
            <span class="logo-text">ChatFlow</span>
        </div>

        <h2>Create an account</h2>
        <p class="subtitle">Join thousands of people using ChatFlow.</p>

        <form method="POST" action="{% url 'account_signup' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email address</label>
                <input type="email" name="email" id="id_email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label for="id_password1">Password</label>
                <input type="password" name="password1" id="id_password1" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Get started</button>
        </form>

        <div class="divider">
            <span>Or join with</span>
        </div>

        <a href="{% provider_login_url 'google' %}" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
        </a>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'account_login' %}">Sign in</a>
        </div>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>

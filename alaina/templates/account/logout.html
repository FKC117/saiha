{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout | ChatFlow</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #111113;
            color: #e4e4e7;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .auth-card {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(82, 82, 91, 0.4);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .icon-container {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            color: #ef4444;
        }
        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p.subtitle {
            color: #a1a1aa;
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn-logout {
            width: 100%;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-logout:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }
        .btn-cancel {
            display: block;
            width: 100%;
            background: rgba(39, 39, 42, 0.5);
            color: white;
            border: 1px solid rgba(82, 82, 91, 0.5);
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .btn-cancel:hover {
            background: rgba(39, 39, 42, 0.8);
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="icon-container">
            <i data-lucide="log-out" size="32"></i>
        </div>

        <h2>Sign out</h2>
        <p class="subtitle">Are you sure you want to sign out of ChatFlow?</p>

        <form method="POST" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Sign out</button>
            <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn-cancel">Cancel</a>
        </form>
    </div>
    
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
